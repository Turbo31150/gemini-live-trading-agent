<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#050810"/><stop offset="100%" stop-color="#0A1020"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#FBBF24"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="520" height="160" rx="14" fill="url(#bg)"/>
  <rect width="520" height="160" rx="14" fill="none" stroke="#34D399" stroke-width="1" stroke-opacity="0.25"/>
  <g transform="translate(22,20)" filter="url(#glow)">
    <!-- Candlestick + voice waveform combo -->
    <circle cx="60" cy="60" r="44" fill="none" stroke="#34D399" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3 3"/>
    <circle cx="60" cy="60" r="28" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="60" cy="60" r="14" fill="#050810" stroke="url(#g1)" stroke-width="2"/>
    <text x="60" y="66" text-anchor="middle" fill="url(#g1)" font-size="12" font-weight="800" filter="url(#glow)">G</text>
    <!-- Voice mic indicator -->
    <circle cx="100" cy="20" r="10" fill="#050810" stroke="#FBBF24" stroke-width="1.5"/>
    <text x="100" y="25" text-anchor="middle" fill="#FBBF24" font-size="10" font-weight="700">♪</text>
    <!-- Candle -->
    <rect x="24" y="42" width="8" height="20" rx="2" fill="#34D399" fill-opacity="0.7"/>
    <line x1="28" y1="34" x2="28" y2="42" stroke="#34D399" stroke-width="1.5"/>
    <line x1="28" y1="62" x2="28" y2="70" stroke="#34D399" stroke-width="1.5"/>
  </g>
  <text x="156" y="54" fill="url(#g1)" font-size="23" font-weight="800" letter-spacing="-0.5" filter="url(#glow)">GEMINI·LIVE·TRADER</text>
  <text x="157" y="76" fill="#2A3A2A" font-size="12.5" letter-spacing="0.5">Real-Time Voice Trading Agent — Gemini Live API · Google Cloud</text>
  <rect x="156" y="86" width="340" height="1.5" rx="1" fill="url(#g1)" opacity="0.3"/>
  <g transform="translate(156,100)">
    <rect x="0"   y="0" width="62" height="22" rx="5" fill="#34D399" fill-opacity="0.1" stroke="#34D399" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="31"  y="15" text-anchor="middle" fill="#34D399" font-size="10">Python</text>
    <rect x="68"  y="0" width="88" height="22" rx="5" fill="#FBBF24" fill-opacity="0.1" stroke="#FBBF24" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="112" y="15" text-anchor="middle" fill="#FBBF24" font-size="10">Gemini Live</text>
    <rect x="162" y="0" width="62" height="22" rx="5" fill="#34D399" fill-opacity="0.1" stroke="#34D399" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="193" y="15" text-anchor="middle" fill="#34D399" font-size="10">Voice</text>
    <rect x="230" y="0" width="58" height="22" rx="5" fill="#FBBF24" fill-opacity="0.1" stroke="#FBBF24" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="259" y="15" text-anchor="middle" fill="#FBBF24" font-size="10">Trading</text>
  </g>
  <text x="156" y="148" fill="#2A3A2A" font-size="10">Turbo31150  ·  MIT  ·  Google Cloud  ·  voice orders  ·  real-time markets</text>
</svg>
