<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — Live Trading Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid #1a1a3a;
            width: 100%;
        }
        .header h1 {
            font-size: 28px;
            color: #00d4ff;
            letter-spacing: 2px;
        }
        .header p { color: #666; font-size: 14px; margin-top: 4px; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        .status {
            font-size: 16px;
            color: #888;
            text-align: center;
        }
        .status.connected { color: #00ff88; }
        .status.error { color: #ff4444; }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #1a1a3a;
            background: #111128;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }
        .mic-button:hover { border-color: #00d4ff; background: #151530; }
        .mic-button.active {
            border-color: #00ff88;
            background: #0a2a1a;
            animation: pulse 2s infinite;
        }
        .mic-button svg { width: 48px; height: 48px; fill: #888; }
        .mic-button.active svg { fill: #00ff88; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.3); }
            50% { box-shadow: 0 0 0 20px rgba(0,255,136,0); }
        }

        .transcript {
            width: 100%;
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
            background: #0d0d20;
            border-radius: 12px;
            border: 1px solid #1a1a3a;
        }
        .transcript .msg {
            padding: 8px 14px;
            border-radius: 10px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }
        .transcript .msg.user {
            align-self: flex-end;
            background: #1a2a4a;
            color: #88bbff;
        }
        .transcript .msg.agent {
            align-self: flex-start;
            background: #1a3a2a;
            color: #88ffbb;
        }
        .transcript .msg.tool {
            align-self: flex-start;
            background: #2a2a1a;
            color: #ffdd88;
            font-size: 12px;
            font-family: monospace;
        }

        .tools-panel {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tool-badge {
            padding: 4px 10px;
            border-radius: 12px;
            background: #1a1a3a;
            color: #00d4ff;
            font-size: 11px;
        }

        canvas#visualizer {
            width: 100%;
            height: 60px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SENTINEL</h1>
        <p>Live Trading Agent — Powered by Gemini</p>
    </div>

    <div class="main">
        <div class="status" id="status">Click the microphone to start</div>

        <canvas id="visualizer"></canvas>

        <button class="mic-button" id="micBtn" onclick="toggleSession()">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>

        <div class="tools-panel">
            <span class="tool-badge">Live Prices</span>
            <span class="tool-badge">Technical Analysis</span>
            <span class="tool-badge">Risk Assessment</span>
            <span class="tool-badge">Price Alerts</span>
            <span class="tool-badge">Market Overview</span>
        </div>

        <div class="transcript" id="transcript"></div>
    </div>

    <script>
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let workletNode = null;
        let isActive = false;

        // Audio playback
        let playbackQueue = [];
        let isPlaying = false;

        const statusEl = document.getElementById('status');
        const micBtn = document.getElementById('micBtn');
        const transcriptEl = document.getElementById('transcript');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            transcriptEl.appendChild(div);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        async function toggleSession() {
            if (isActive) {
                stopSession();
            } else {
                await startSession();
            }
        }

        async function startSession() {
            try {
                statusEl.textContent = 'Connecting...';
                statusEl.className = 'status';

                // Connect WebSocket
                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${location.host}/ws`);
                ws.binaryType = 'arraybuffer';

                ws.onopen = async () => {
                    statusEl.textContent = 'Connected — Speak now';
                    statusEl.className = 'status connected';
                    micBtn.classList.add('active');
                    isActive = true;
                    await startMicrophone();
                };

                ws.onmessage = (event) => {
                    if (event.data instanceof ArrayBuffer) {
                        // Audio from Gemini — queue for playback
                        playAudio(event.data);
                    } else {
                        // JSON event
                        const data = JSON.parse(event.data);
                        handleEvent(data);
                    }
                };

                ws.onclose = () => {
                    stopSession();
                    statusEl.textContent = 'Disconnected';
                    statusEl.className = 'status';
                };

                ws.onerror = () => {
                    statusEl.textContent = 'Connection error';
                    statusEl.className = 'status error';
                };

            } catch (e) {
                statusEl.textContent = `Error: ${e.message}`;
                statusEl.className = 'status error';
            }
        }

        function handleEvent(data) {
            switch (data.type) {
                case 'input_transcription':
                    addMessage(data.text, 'user');
                    break;
                case 'output_transcription':
                    addMessage(data.text, 'agent');
                    break;
                case 'tool_call':
                    addMessage(`Calling ${data.name}...`, 'tool');
                    break;
                case 'tool_result':
                    const preview = JSON.stringify(data.result).substring(0, 120);
                    addMessage(`${data.name}: ${preview}`, 'tool');
                    break;
                case 'interrupted':
                    clearPlaybackQueue();
                    break;
                case 'session_ended':
                    addMessage(`Session ended: ${data.reason}`, 'tool');
                    stopSession();
                    break;
            }
        }

        async function startMicrophone() {
            audioContext = new AudioContext({ sampleRate: 16000 });

            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: 16000,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                }
            });

            const source = audioContext.createMediaStreamSource(mediaStream);

            // Use ScriptProcessor for simplicity (AudioWorklet needs separate file)
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            processor.onaudioprocess = (e) => {
                if (!isActive || !ws || ws.readyState !== WebSocket.OPEN) return;

                const float32 = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(float32.length);
                for (let i = 0; i < float32.length; i++) {
                    int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32767));
                }
                ws.send(int16.buffer);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);
        }

        function playAudio(pcmData) {
            if (!audioContext) return;

            // Gemini outputs 24kHz PCM16
            const int16 = new Int16Array(pcmData);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768;
            }

            const playbackCtx = new AudioContext({ sampleRate: 24000 });
            const buffer = playbackCtx.createBuffer(1, float32.length, 24000);
            buffer.getChannelData(0).set(float32);

            const source = playbackCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(playbackCtx.destination);
            source.start();
        }

        function clearPlaybackQueue() {
            playbackQueue = [];
        }

        function stopSession() {
            isActive = false;
            micBtn.classList.remove('active');

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop' }));
                ws.close();
            }
            ws = null;

            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }

            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            statusEl.textContent = 'Click the microphone to start';
            statusEl.className = 'status';
        }
    </script>
</body>
</html>
